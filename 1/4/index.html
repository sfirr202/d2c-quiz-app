          { "text": "D2Cの方が、企画から販売開始までのリードタイムを長く取る必要がある。", "rationale": "D2Cの方が機動的に動ける傾向があります。", "isCorrect": false },
          { "text": "D2Cは広告・販促の訴求次第で受注が急変動するため、店頭（一般流通）の動向を待つサプライチェーン発想では遅すぎる。", "rationale": "D2Cはアクション（計画）で需要を創り出すため、素早い連携（アクションチェーン）が必要です。", "isCorrect": true },

          { "text": "「細かい作業のことにしか関心がなく、新しい企画に非協力的だ」", "rationale": "現場が「今の作業を回すこと」で手一杯になり、新しい挑戦を拒むように見えることへの不満の典型例です。", "isCorrect": true },

        "answerOptions": [

          { "text": "圧倒的な体験価値", "rationale": "部門が連携してシームレスに動くことで、顧客の期待を超える圧倒的な体験価値を提供できます。", "isCorrect": true },
          { "text": "一切の遅延のない配送", "rationale": "体験価値の一部ですが、それだけではありません。", "isCorrect": false },

      {

        "question": "顧客が休眠や離脱に至るタイミングは、カスタマー・ジャーニー（サステナブルマップ）においていつ発生する可能性があるか。",
        "answerOptions": [
          { "text": "商品を購入する前だけ", "rationale": "不適切です。", "isCorrect": false },
          { "text": "購入後、商品を受け取った直後だけ", "rationale": "不適切です。", "isCorrect": false },
          { "text": "認知から購入、使用開始、使用継続に至るすべてのステップ（接点）", "rationale": "図に示されているように、すべてのステップで「休眠・離脱」に分岐する矢印が描かれています。", "isCorrect": true },
          { "text": "定期購入を解約した後だけ", "rationale": "不適切です。", "isCorrect": false }
        ],
        "hint": "お客様が「もういいや」と思う瞬間は、旅の途中のどこにでも潜んでいます。"
      }
    ];

    function App() {
      const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'result'
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedAnswerIndex, setSelectedAnswerIndex] = useState(null);
      const [showHint, setShowHint] = useState(false);

      const startQuiz = () => {
        setGameState('playing');
        setCurrentQuestionIndex(0);
        setScore(0);
        setSelectedAnswerIndex(null);
        setShowHint(false);
      };

      const handleAnswerSelect = (index) => {
        if (selectedAnswerIndex !== null) return; // Prevent multiple selections
        setSelectedAnswerIndex(index);
        if (quizData[currentQuestionIndex].answerOptions[index].isCorrect) {
          setScore(score + 1);
        }
      };

      const nextQuestion = () => {
        if (currentQuestionIndex < quizData.length - 1) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
          setSelectedAnswerIndex(null);
          setShowHint(false);
        } else {
          setGameState('result');
        }
      };

      const currentQuestion = quizData[currentQuestionIndex];
      const totalQuestions = quizData.length;
      const progressPercentage = ((currentQuestionIndex) / totalQuestions) * 100;
      
      // 合格ラインは7割（50問中35問正解）
      const passingScore = Math.ceil(totalQuestions * 0.7);

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center py-10 px-4 font-sans text-slate-800">
          
          {/* Header */}
          <header className="mb-8 text-center max-w-2xl w-full">
            <div className="flex items-center justify-center gap-2 mb-2">
              <BookOpen className="w-8 h-8 text-blue-600" />
              <h1 className="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">D2Cエキスパート検定1級</h1>
            </div>
            <p className="text-slate-500">第4章：オペレーション管理の視点で見た価値の創造/伝達/提供 対策クイズ（全50問）</p>
          </header>

          {/* Main Content Area */}
          <main className="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            
            {/* State: START */}
            {gameState === 'start' && (
              <div className="p-10 text-center flex flex-col items-center">
                <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-6 text-blue-600">
                  <Award className="w-12 h-12" />
                </div>
                <h2 className="text-2xl font-bold mb-4">検定本番に向けた腕試し！</h2>
                <p className="text-slate-600 mb-8 max-w-lg">
                  テキスト第4章「オペレーション管理」の知識を網羅した、全50問の特大ボリュームクイズです。
                  アクションチェーンや部門間連携の重要項目が詰まっています。合格ラインは70%（35問正解）です！
                </p>
                <button
                  onClick={startQuiz}
                  className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-10 rounded-full text-lg transition-all transform hover:scale-105 shadow-md flex items-center gap-2"
                >
                  クイズを始める
                  <ChevronRight className="w-5 h-5" />
                </button>
              </div>
            )}

            {/* State: PLAYING */}
            {gameState === 'playing' && (
              <div className="flex flex-col h-full">
                {/* Progress Bar */}
                <div className="w-full bg-slate-100 h-2">
                  <div 
                    className="bg-blue-500 h-2 transition-all duration-300 ease-out"
                    style={{ width: `${progressPercentage}%` }}
                  ></div>
                </div>

                <div className="p-6 md:p-8 flex-grow">
                  {/* Question Header */}
                  <div className="flex justify-between items-center mb-6">
                    <span className="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full">
                      問題 {currentQuestionIndex + 1} / {totalQuestions}
                    </span>
                    <button 
                      onClick={() => setShowHint(!showHint)}
                      className={`flex items-center gap-1 text-sm font-medium transition-colors ${showHint ? 'text-amber-500' : 'text-slate-400 hover:text-amber-500'}`}
                    >
                      <Lightbulb className="w-4 h-4" />
                      ヒント
                    </button>
                  </div>

                  {/* Question Text */}
                  <h3 className="text-xl md:text-2xl font-bold leading-relaxed mb-6 whitespace-pre-line">
                    {currentQuestion.question}
                  </h3>

                  {/* Hint Box */}
                  {showHint && (
                    <div className="bg-amber-50 border border-amber-200 text-amber-800 rounded-lg p-4 mb-6 text-sm animate-fade-in flex items-start gap-3">
                      <Lightbulb className="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" />
                      <p>{currentQuestion.hint}</p>
                    </div>
                  )}

                  {/* Options */}
                  <div className="space-y-3">
                    {currentQuestion.answerOptions.map((option, index) => {
                      const isSelected = selectedAnswerIndex === index;
                      const isCorrect = option.isCorrect;
                      const hasAnswered = selectedAnswerIndex !== null;
                      
                      // Style logic based on answer state
                      let buttonStyle = "bg-white border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
                      if (hasAnswered) {
                        if (isCorrect) {
                          buttonStyle = "bg-green-50 border-2 border-green-500 text-green-800";
                        } else if (isSelected) {
                          buttonStyle = "bg-red-50 border-2 border-red-400 text-red-800";
                        } else {
                          buttonStyle = "bg-slate-50 border-2 border-slate-200 text-slate-400 opacity-60";
                        }
                      }

                      return (
                        <button
                          key={index}
                          onClick={() => handleAnswerSelect(index)}
                          disabled={hasAnswered}
                          className={`w-full text-left p-4 rounded-xl font-medium transition-all duration-200 flex items-start gap-3 ${buttonStyle}`}
                        >
                          {/* Status Icon */}
                          <div className="flex-shrink-0 mt-0.5">
                            {hasAnswered && isCorrect ? (
                              <CheckCircle2 className="w-5 h-5 text-green-500" />
                            ) : hasAnswered && isSelected && !isCorrect ? (
                              <XCircle className="w-5 h-5 text-red-500" />
                            ) : (
                              <div className="w-5 h-5 rounded-full border-2 border-current opacity-30 flex items-center justify-center text-xs">
                                {index + 1}
                              </div>
                            )}
                          </div>
                          <span className="flex-grow">{option.text}</span>
                        </button>
                      );
                    })}
                  </div>

                  {/* Explanation Area (Shows after answering) */}
                  {selectedAnswerIndex !== null && (
                    <div className="mt-8 pt-6 border-t border-slate-100 animate-fade-in">
                      <div className={`flex items-center gap-2 mb-3 text-lg font-bold ${currentQuestion.answerOptions[selectedAnswerIndex].isCorrect ? 'text-green-600' : 'text-red-500'}`}>
                        {currentQuestion.answerOptions[selectedAnswerIndex].isCorrect ? (
                          <><CheckCircle2 className="w-6 h-6" /> 正解！</>
                        ) : (
                          <><XCircle className="w-6 h-6" /> 不正解...</>
                        )}
                      </div>
                      
                      <div className="bg-slate-50 p-5 rounded-xl text-slate-700 text-sm leading-relaxed mb-6 border border-slate-200">
                        <span className="font-bold text-slate-900 block mb-2">解説：</span>
                        {currentQuestion.answerOptions[selectedAnswerIndex].rationale}
                        
                        {!currentQuestion.answerOptions[selectedAnswerIndex].isCorrect && (
                          <div className="mt-4 pt-4 border-t border-slate-200">
                            <span className="font-bold text-slate-900 block mb-1">正解は：</span>
                            <span className="text-green-700 font-medium">
                              {currentQuestion.answerOptions.find(o => o.isCorrect).text}
                            </span>
                            <p className="mt-1 text-slate-600">
                               {currentQuestion.answerOptions.find(o => o.isCorrect).rationale}
                            </p>
                          </div>
                        )}
                      </div>

                      <button
                        onClick={nextQuestion}
                        className="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3.5 rounded-xl transition-colors flex justify-center items-center gap-2"
                      >
                        {currentQuestionIndex < totalQuestions - 1 ? '次の問題へ' : '結果を見る'}
                        <ChevronRight className="w-5 h-5" />
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* State: RESULT */}
            {gameState === 'result' && (
              <div className="p-10 text-center flex flex-col items-center">
                <div className="mb-6 relative">
                  <svg className="w-32 h-32 transform -rotate-90">
                    <circle cx="64" cy="64" r="56" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-100" />
                    <circle 
                      cx="64" cy="64" r="56" 
                      stroke="currentColor" 
                      strokeWidth="12" 
                      fill="transparent" 
                      strokeDasharray="351.86" 
                      strokeDashoffset={351.86 - (351.86 * (score / totalQuestions))}
                      className={`${score >= passingScore ? 'text-green-500' : 'text-blue-500'} transition-all duration-1000 ease-out`} 
                      strokeLinecap="round"
                    />
                  </svg>
                  <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center">
                    <span className="text-3xl font-black">{score}</span>
                    <span className="text-lg text-slate-400">/{totalQuestions}</span>
                  </div>
                </div>

                <h2 className="text-2xl font-bold mb-2">
                  {score === totalQuestions ? 'パーフェクト！完璧な理解度です！' : 
                   score >= passingScore ? '合格ライン到達！よく頑張りました！' : 
                   'もう少し！復習して再挑戦しましょう！'}
                </h2>
                <p className="text-slate-600 mb-8">
                  正答率: {Math.round((score / totalQuestions) * 100)}%
                </p>

                <button
                  onClick={startQuiz}
                  className="bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold py-3 px-8 rounded-full transition-colors flex items-center gap-2"
                >
                  <RefreshCw className="w-5 h-5" />
                  もう一度挑戦する
                </button>
              </div>
            )}

          </main>
          
          <footer className="mt-8 text-center text-sm text-slate-400">
            &copy; D2C Expert Association Quiz Simulator
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
